name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        # The 158 tests are offline / import-level: no browser binary needed,
        # so we deliberately skip `camoufox fetch` / `patchright install`.
        run: uv sync --extra dev

      - name: Lint (ruff)
        # ruff is run as an ephemeral tool via uvx so it does not need to be a
        # project dependency.
        run: uvx ruff check .

      - name: Test (pytest)
        run: uv run pytest -q
